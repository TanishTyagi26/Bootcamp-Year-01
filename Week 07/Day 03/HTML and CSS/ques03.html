<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        div{
            background-color: red;
            padding: 20px;
            border: 5px solid black;
            margin: 20px;
            display: inline-block;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div >
        <span>span 1</span>
        <span>span 2</span>
        <span>span 3</span>
    </div>
    
</body>
</html>
