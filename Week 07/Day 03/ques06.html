<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: rgb(0, 255, 38);
            height: 100px;
            width: 100px;
        }
        @keyframes fade {
            0% {opacity: 0;}
            50% {opacity: 1;}
            100% {opacity: 0;}
            
        }
        div{width:150px;
            height:150px;
            background-color: rgb(0, 255, 38);
            animation-name: fade;
            animation-duration: 4s;
            animation-iteration-count: infinite;
        }
    </style>
</head>
<body>
    <div>hello div</div>
</body>
</html>
