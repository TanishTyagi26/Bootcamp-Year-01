<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        #content_box{
            width:200px;
            padding:30px;
            border:5px solid red;

        }
        #border_box{
            width:200px;
            padding:30px;
            border:5px solid red;
            box-sizing:border-box;
        }
    </style>
</head>
<body>
    <div id="content_box"></div>
    <div id="border_box"></div>
</body>
</html>
